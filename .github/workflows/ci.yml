name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  installability:
    name: Node ${{ matrix.node-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python test dependencies
        run: python -m pip install pytest

      - name: Installer tests
        run: npm run test:installer

      - name: Script tests
        run: npm run test:scripts

      - name: Python tool tests
        run: npm run test:python

      - name: CLI smoke
        run: node bin/lumina.js --version --no-update

      - name: Install idempotency
        run: npm run ci:idempotency

      - name: Package readiness
        run: npm run ci:package
