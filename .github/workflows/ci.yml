name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  installability:
    name: Node ${{ matrix.node-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22]
        exclude:
          # Node 22 node:test runner has a structured-clone IPC bug
          # (ERR_TEST_FAILURE / uncaughtException in runner internals) that
          # surfaces on both Windows and macOS hosted runners. Node 20 already
          # covers all three OSes; drop the Node 22 combinations on Windows and
          # macOS until the upstream bug is fixed.
          - os: windows-latest
            node-version: 22
          - os: macos-latest
            node-version: 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python test dependencies
        run: python -m pip install -r src/tools/requirements.txt

      - name: Installer tests
        run: npm run test:installer

      - name: Script tests
        run: npm run test:scripts

      - name: Python tool tests
        run: npm run test:python

      - name: CLI smoke
        run: node bin/lumina.js --version --no-update

      - name: Install idempotency
        run: npm run ci:idempotency

      # Cold-start is a property of Node module loading and is dominated by
      # filesystem latency. Windows hosted runners (D:\ network-backed) and
      # macOS runners measure 2-3x slower than Linux for the same code, so the
      # gate runs only on ubuntu-latest. Other OSes still exercise the CLI via
      # the smoke step above.
      - name: Cold-start budget
        if: runner.os == 'Linux'
        run: npm run ci:cold-start

      - name: Package readiness
        run: npm run ci:package

  bun-smoke:
    name: Bun smoke (ubuntu)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Node dependencies
        run: bun install

      - name: CLI version (cold-start under Bun)
        run: bun bin/lumina.js --version --no-update

      - name: End-to-end install under Bun
        run: bun run dev:sandbox -- --yes --packs core
