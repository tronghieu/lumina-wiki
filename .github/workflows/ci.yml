name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  installability:
    name: Node ${{ matrix.node-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Node 22 node:test runner has a structured-clone IPC bug
        # (ERR_TEST_FAILURE / "Unable to deserialize cloned data due to invalid
        # or unsupported version" in node:internal/test_runner/runner) that
        # surfaces intermittently on every hosted runner (Windows, macOS, and
        # ubuntu). Stay on Node 20 across all OSes until the upstream fix
        # lands; revisit when Node 22.x patches the runner IPC.
        node-version: [20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python test dependencies
        run: python -m pip install -r src/tools/requirements.txt

      - name: Installer tests
        run: npm run test:installer

      - name: Script tests
        run: npm run test:scripts

      - name: Python tool tests
        run: npm run test:python

      - name: CLI smoke
        run: node bin/lumina.js --version --no-update

      - name: Install idempotency
        run: npm run ci:idempotency

      # Cold-start is a property of Node module loading and is dominated by
      # filesystem latency. Windows hosted runners (D:\ network-backed) and
      # macOS runners measure 2-3x slower than Linux for the same code, so the
      # gate runs only on ubuntu-latest. Other OSes still exercise the CLI via
      # the smoke step above.
      - name: Cold-start budget
        if: runner.os == 'Linux'
        run: npm run ci:cold-start

      - name: Package readiness
        run: npm run ci:package

  bun-smoke:
    name: Bun smoke (ubuntu)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Node dependencies
        run: bun install

      - name: CLI version (cold-start under Bun)
        run: bun bin/lumina.js --version --no-update

      - name: End-to-end install under Bun
        run: bun run dev:sandbox -- --yes --packs core

  desktop:
    name: Desktop / Ubuntu
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: apps/desktop/go.sum

      - name: Install Wails Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Install desktop frontend dependencies
        working-directory: apps/desktop/frontend
        run: npm ci

      - name: Test desktop frontend
        working-directory: apps/desktop/frontend
        run: npm test

      - name: Build desktop frontend
        working-directory: apps/desktop/frontend
        run: npm run build

      - name: Test desktop backend
        working-directory: apps/desktop
        run: go test ./...
